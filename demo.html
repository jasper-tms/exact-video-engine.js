<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>exact-video-engine.js — demo</title>

<!-- Loaded exactly the way the real consumers (SportViewer, movim.ai) load it:
     mp4box.js first, so the MP4Box/DataStream globals exist, then the engine
     from a PINNED release tag. Never reference @main — jsDelivr caches branch
     refs for hours, so the page would change behavior at unpredictable times
     with no commit anywhere. -->
<script src="https://unpkg.com/mp4box@0.5.2/dist/mp4box.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/jasper-tms/exact-video-engine.js@v1.3.0/exact-video-engine.js"></script>

<style>
  :root {
    --background: #12141a;
    --panel: #1b1f28;
    --line: #2c3240;
    --text: #e8eaf0;
    --muted: #949bab;
    --accent: #5aa9ff;
    --exact: #34c98b;
    --approximate: #e0a13a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    padding: 32px 20px 48px;
    background: var(--background);
    color: var(--text);
    font: 15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  main { max-width: 900px; margin: 0 auto; }
  h1 { margin: 0 0 4px; font-size: 20px; font-weight: 600; }
  .subtitle { margin: 0 0 24px; color: var(--muted); font-size: 14px; }
  code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.9em; }

  /* Drop target: the whole page accepts a drop. The dashed panel is only the
     hint shown before a clip is loaded — once one is, it gets out of the way and
     the drag feedback moves to the page outline below. */
  #dropzone {
    border: 2px dashed var(--line);
    border-radius: 12px;
    padding: 48px 24px;
    text-align: center;
    transition: border-color 120ms, background 120ms;
  }
  #dropzone.dragover { border-color: var(--accent); background: #1a2333; }
  #dropzone p { margin: 0 0 16px; color: var(--muted); }
  body.loaded #dropzone { display: none; }

  /* Dragging over a page that already has a clip: nothing to point at, so the
     whole viewport becomes the target. */
  body.loaded.dragover::after {
    content: "Drop to replace";
    position: fixed;
    inset: 8px;
    border: 2px dashed var(--accent);
    border-radius: 12px;
    background: rgba(90, 169, 255, 0.06);
    color: var(--accent);
    font-size: 14px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 16px;
    pointer-events: none;
  }

  button {
    font: inherit;
    color: var(--text);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 16px;
    cursor: pointer;
  }
  button:hover:not(:disabled) { border-color: var(--accent); }
  button:disabled { opacity: 0.4; cursor: default; }
  /* The two step buttons carry a single glyph; give them a common width so the
     control bar does not shift, and keep the triangles optically centered. */
  #previous, #next { min-width: 48px; text-align: center; line-height: 1; }

  #player { display: none; }
  #player.loaded { display: block; }

  /* The engine sizes its canvas backing store to this pane, and letterboxes
     inside it. The <video> is styled to match with object-fit: contain. */
  #pane {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
  }
  #pane canvas, #pane video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  /* Tabular figures so the frame counter does not jitter as digits change. */
  .readout {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-variant-numeric: tabular-nums;
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
  }
  .readout strong { color: var(--text); font-weight: 600; }
  input[type=range] { flex: 1; min-width: 160px; accent-color: var(--accent); }

  .badges { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .badge {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--muted);
  }
  .badge.exact { border-color: var(--exact); color: var(--exact); }
  .badge.approximate { border-color: var(--approximate); color: var(--approximate); }
  /* The engine badge is a button: click it to replay the clip through the other
     engine. Overrides the generic button rule's padding so it matches the pill
     next to it. */
  button.badge {
    padding: 4px 10px;
    font: inherit;
    font-size: 12px;
    cursor: pointer;
  }
  button.badge:hover:not(:disabled) { border-color: var(--accent); color: var(--text); }
  button.badge::after { content: " ⇄"; opacity: 0.6; }
  /* Nothing to toggle to when the container yields no sample table (WebM, or one
     we could not read at all): WebCodecs has nothing to decode from, so native is
     the only engine. Drop the swap arrow
     rather than advertise an action that does not exist — and keep the pill at
     full opacity (unlike the generic disabled button) since it is still saying
     something true and worth reading. */
  button.badge:disabled { opacity: 1; cursor: default; }
  button.badge:disabled::after { content: none; }

  /* Names the clip directly above the frame it labels. */
  #clip-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 8px;
    min-width: 0;
  }
  #clip-name {
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #clip-size {
    color: var(--muted);
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  #status { margin-top: 16px; font-size: 14px; color: var(--muted); min-height: 21px; }
  #status.error { color: #ff8080; }
</style>
</head>
<body>
<main>
  <h1>exact-video-engine.js</h1>
  <p class="subtitle">
    Frame-perfect playback. Drop a video below to see which engine it gets and
    whether its frame indices are exact.
  </p>

  <div id="dropzone">
    <p>Drop a video here</p>
    <button id="browse">Browse&hellip;</button>
    <input id="file-input" type="file" accept="video/*" hidden>
  </div>

  <div id="player">
    <div id="clip-header">
      <span id="clip-name"></span>
      <span id="clip-size"></span>
    </div>

    <div id="pane">
      <canvas id="engine-canvas"></canvas>
      <video id="native-video" muted playsinline></video>
    </div>

    <div class="controls">
      <button id="play">Play</button>
      <button id="previous" title="Previous frame">&#9664;</button>
      <button id="next" title="Next frame">&#9654;</button>
      <span class="readout">
        frame <strong id="frame-readout">0</strong> / <span id="total-readout">0</span>
      </span>
      <input id="scrubber" type="range" min="0" max="0" step="1" value="0">
      <span class="readout">
        <strong id="time-readout">0:00.000</strong> / <span id="duration-readout">0:00.000</span>
      </span>
    </div>

    <div class="badges">
      <span class="badge" id="format-badge"></span>
      <button class="badge" id="engine-badge" type="button"
              title="Click to play this clip through the other engine"></button>
    </div>
  </div>

  <div id="status"></div>
</main>

<script>
const canvas = document.getElementById('engine-canvas');
const video = document.getElementById('native-video');
const dropzone = document.getElementById('dropzone');
const player = document.getElementById('player');
const status = document.getElementById('status');
const playButton = document.getElementById('play');
const scrubber = document.getElementById('scrubber');
const frameReadout = document.getElementById('frame-readout');
const totalReadout = document.getElementById('total-readout');
const timeReadout = document.getElementById('time-readout');
const durationReadout = document.getElementById('duration-readout');

let engine = null;
let scrubbing = false;

// ?engine=native forces the <video> fallback, ?engine=webcodecs forces WebCodecs.
// Without it the library picks, which on a modern desktop browser always means
// WebCodecs — so this, and the engine pill below the video, are the only ways to
// see the fallback tiers the library exists to provide. Either way the request is
// only a preference: a clip WebCodecs cannot play still falls back.
let prefer = new URLSearchParams(location.search).get('engine') || 'auto';
let currentFile = null;
// The index for the clip in the player, or null if mp4box could not read its
// container. Kept because it decides whether the WebCodecs engine is reachable
// at all — see showEngineBadge().
let currentIndex = null;

// Milliseconds, not the usual m:ss — a frame at 30 fps is 33 ms, so anything
// coarser would sit unchanged while the frame counter next to it advances.
function formatTime(seconds) {
  if (!(seconds >= 0)) seconds = 0;
  const minutes = Math.floor(seconds / 60);
  const rest = seconds - minutes * 60;
  return `${minutes}:${rest.toFixed(3).padStart(6, '0')}`;
}

function setStatus(message, isError) {
  status.textContent = message || '';
  status.classList.toggle('error', !!isError);
}

async function load(file) {
  currentFile = file;
  setStatus('Loading ' + file.name + '…');
  // Decoders are a limited browser resource, so hand back the previous engine's
  // before building another.
  if (engine) { engine.destroy(); engine = null; }

  // Build the container index here rather than letting createBestEngine do it,
  // so we can report whether this container could be read at all — the thing
  // that decides whether frame indices are exact or merely assumed. Passing the
  // result (index, or null for "tried and failed") keeps it from being built
  // twice. The time budget is ours to choose because we are the caller now:
  // ContainerIndex left to itself will read a WebM of any size for as long as it
  // takes, which is right for a script and wrong for a page with a user waiting.
  let containerIndex = null;
  try {
    containerIndex = await ContainerIndex.fromSource(file, { timeoutMilliseconds: 10000 });
  } catch (indexError) {
    containerIndex = null;
  }
  currentIndex = containerIndex;
  showFormatBadge(file, containerIndex);

  try {
    engine = await createBestEngine(file, { canvas, video, prefer, index: containerIndex });
  } catch (error) {
    // Nothing is playing now, so bring the drop panel back rather than leave a
    // dead player on screen.
    player.classList.remove('loaded');
    document.body.classList.remove('loaded');
    setStatus('Could not play this file: ' + error.message, true);
    return;
  }

  // The engine plays into one of the two elements; show that one.
  for (const element of [canvas, video]) {
    element.style.display = (element === engine.displayElement) ? '' : 'none';
  }

  // Reveal the player BEFORE sizing the canvas to it. resizeCanvas() measures
  // the pane, and a hidden pane measures 0x0 — which is how a correctly decoded
  // frame ends up as a flat wash of its own average colour, stretched across the
  // pane from a 1x1 backing store.
  player.classList.add('loaded');
  // Retires the drop panel and hands drag feedback to the page outline; the drop
  // listeners are on the document, so dropping a replacement keeps working.
  document.body.classList.add('loaded');

  engine.loop = true;
  engine.resizeCanvas();

  scrubber.max = Math.max(0, engine.numFrames - 1);
  scrubber.value = 0;
  // The LAST INDEX, not the frame count. Frame indices are 0-based everywhere in
  // this library, so a 30-frame clip ends at frame 29 — and printing "29 / 30"
  // invites you to go looking for a frame 30 that does not exist.
  totalReadout.textContent = Math.max(0, engine.numFrames - 1);
  totalReadout.title = `${engine.numFrames} frames, numbered 0 to ${engine.numFrames - 1}`;
  durationReadout.textContent = formatTime(engine.duration);

  showEngineBadge();

  document.getElementById('clip-name').textContent = file.name;
  document.getElementById('clip-size').textContent =
    `${engine.videoWidth}×${engine.videoHeight}`;

  setStatus('');
  playButton.textContent = 'Play';
}

// Whether the container could be indexed. That is the fork in the road: the index
// is the real per-frame timestamp table, so it decides whether frame indices are
// exact or fall back to an assumed constant frame rate. MP4 is indexed by mp4box
// (from the moov) and WebM by the engine's own cluster scan — but only the MP4
// index carries the sample table WebCodecs needs, so it is also the gate on the
// WebCodecs engine.
function showFormatBadge(file, containerIndex) {
  const dot = file.name.lastIndexOf('.');
  const extension = dot === -1 ? '?' : file.name.slice(dot).toLowerCase();
  const badge = document.getElementById('format-badge');
  // Spelling out the consequence, not just the verdict: "could not index" means
  // nothing to a reader who does not already know that the container is where
  // the per-frame timestamp table comes from. Note what is NOT lost in the
  // failing case — the presented frame's timestamp is still exact, because
  // requestVideoFrameCallback reports it; what is missing is the table needed to
  // turn that timestamp into a frame index.
  badge.textContent = `Format ${extension} → `
    + (containerIndex
      ? 'indexed → frame indices and times are exact'
      : 'could not index → frame indices only correct for constant frame rate '
        + 'videos, but times are exact');
  badge.className = 'badge ' + (containerIndex ? 'exact' : 'approximate');
  badge.title = containerIndex
    ? `Read the real per-frame timestamp table out of this ${containerIndex.containerFormat}`
      + ' container, so frame indices are exact even on a variable-frame-rate clip.'
      + (containerIndex.supportsWebCodecs ? '' : ' WebM carries no sample table for '
        + 'WebCodecs to decode from, so the <video> element plays it — with exact '
        + 'frame numbers all the same.')
    : 'Only MP4 (mp4box) and WebM (built-in) can be indexed, and a WebM index has '
      + 'a time budget it may run out of. The <video> element may still play this '
      + 'clip, but frame indices come from an assumed constant frame rate.';
}

// Names the engine actually in use — not the one requested, since a request is
// only a preference and a clip WebCodecs cannot play falls back regardless.
function showEngineBadge() {
  const badge = document.getElementById('engine-badge');
  const isNative = engine.tier.startsWith('native');
  badge.textContent = `Engine: ${isNative ? 'native' : 'webcodecs'}`;

  // Without an index that WebCodecs can decode from there is no other engine to
  // toggle to. WebCodecs is a decoder, not a demuxer: something has to hand it
  // the encoded chunks, which means a sample table — and only the MP4 index has
  // one (a WebM index is timestamps and nothing else). So for a WebM, and for
  // any container we could not index at all, the native element is the only
  // engine that can play the clip. Leaving the pill live would offer a switch
  // that silently lands back where it started.
  const canDecodeHere = !!(currentIndex && currentIndex.supportsWebCodecs);
  badge.disabled = !canDecodeHere;
  badge.title = !canDecodeHere
    ? engine.tier + ' — WebCodecs needs a demuxed sample table to decode from and '
      + 'this container has none to give, so the native element is the only engine '
      + 'available'
    : engine.tier + ' — click to play this clip through the other engine';
}

// The engine pill is a toggle: flip the preference and reload the same clip.
document.getElementById('engine-badge').addEventListener('click', () => {
  if (!engine || !currentFile) return;
  prefer = engine.tier.startsWith('native') ? 'webcodecs' : 'native';
  load(currentFile);
});

// One rAF loop for the life of the page. VideoEngine advances its playhead and
// paints inside update(); NativeVideoEngine's update() is a no-op (the element
// runs its own clock), so calling it unconditionally is safe and is the whole
// point of the two engines sharing a surface.
function tick(now) {
  if (engine && engine.ready) {
    engine.update(now);
    const frame = engine.currentFrame;
    frameReadout.textContent = frame;
    timeReadout.textContent = formatTime(engine.currentTime);
    if (!scrubbing) scrubber.value = frame;
    playButton.textContent = engine.paused ? 'Play' : 'Pause';
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

playButton.addEventListener('click', () => {
  if (!engine) return;
  engine.paused ? engine.play() : engine.pause();
});
document.getElementById('previous').addEventListener('click', () => {
  if (!engine) return;
  engine.pause();
  engine.seekToFrame(engine.currentFrame - 1);
});
document.getElementById('next').addEventListener('click', () => {
  if (!engine) return;
  engine.pause();
  engine.seekToFrame(engine.currentFrame + 1);
});
scrubber.addEventListener('pointerdown', () => { scrubbing = true; });
scrubber.addEventListener('pointerup', () => { scrubbing = false; });
scrubber.addEventListener('input', () => {
  if (!engine) return;
  engine.pause();
  engine.seekToFrame(parseInt(scrubber.value, 10));
});

// Browse
const fileInput = document.getElementById('file-input');
document.getElementById('browse').addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  if (fileInput.files.length) load(fileInput.files[0]);
});

// Drag and drop, anywhere on the page, whether or not a clip is already loaded.
// dragover must be cancelled or the browser navigates away to the dropped file
// instead of handing it to us. The `dragover` class goes on both the panel and
// the body: only one of them is visible at a time (see the CSS), so this is one
// listener serving the empty and the loaded state.
function setDragging(dragging) {
  dropzone.classList.toggle('dragover', dragging);
  document.body.classList.toggle('dragover', dragging);
}
for (const type of ['dragenter', 'dragover']) {
  document.addEventListener(type, (event) => {
    event.preventDefault();
    setDragging(true);
  });
}
document.addEventListener('dragleave', (event) => {
  // relatedTarget is null only when the pointer leaves the window entirely;
  // without that check, crossing between elements would flicker the highlight.
  if (event.relatedTarget === null) setDragging(false);
});
document.addEventListener('drop', (event) => {
  event.preventDefault();
  setDragging(false);
  const file = event.dataTransfer.files[0];
  if (file) load(file);
});

window.addEventListener('resize', () => { if (engine) engine.resizeCanvas(); });
</script>
</body>
</html>
