<!doctype html>
<meta charset="utf-8">
<title>exact-video-engine frame-index test</title>
<script src="https://unpkg.com/mp4box@0.5.2/dist/mp4box.all.min.js"></script>
<script src="/exact-video-engine.js"></script>
<!-- Sized to the clips' exact aspect (150x90) so nothing is letterboxed and the
     bar's position in the rendering maps straight back to its position in the
     source frame. -->
<div id="pane" style="width: 150px; height: 90px">
  <canvas id="engine-canvas"></canvas>
</div>
<video id="native-video" muted playsinline></video>
<script>
// Walks ?file=<clip> frame by frame through the engine named by ?mode=, and for
// each frame records BOTH what the engine says is on screen and what is
// actually on screen. The clips identify each frame by the position of a white
// bar (frame n -> bar at x = 5n of 150), so "what is actually on screen" is
// recoverable from the pixels with no trust in any clock.
//
//   mode=webcodecs        WebCodecs engine (decodes every frame itself)
//   mode=native-index     <video> element + the container's real PTS table
//
// There is no approximate mode to drive anymore: a clip the engine cannot index
// is refused at load (see plan_always_build_an_index.md), which
// robustness-test.mjs pins; this harness only walks clips that indexed.
//
// A clip the BROWSER cannot decode at all (Ogg outside Firefox, say) reports
// { unplayable: true } instead of a frame walk, and the driver decides per
// browser whether that is expected.
// The clips are drawn 5 px per bar across 150 px, i.e. exactly one bar slot per
// frame, so every column of the image belongs to some frame and the last frame's
// bar reaches the right edge.
const BARS_ACROSS = 30;

// The frame the pixels say is showing: find the bar (columns brighter than
// half), take its centre, and convert that to a bar index. Reading the centre
// rather than the brightest single column keeps a resampled or antialiased edge
// from shifting the answer by one.
function visibleFrame(canvas) {
  const width = canvas.width, height = canvas.height;
  const row = canvas.getContext('2d')
    .getImageData(0, Math.floor(height / 2), width, 1).data;
  let sum = 0, count = 0;
  for (let x = 0; x < width; x++) {
    if (row[x * 4] > 128) { sum += x; count += 1; }
  }
  if (!count) return -1;   // no bar found: nothing painted
  return Math.floor((sum / count) / (width / BARS_ACROSS));
}

const probe = document.createElement('canvas');
probe.width = 150;
probe.height = 90;
const probeContext = probe.getContext('2d');

// Caps for the two <video> synchronisation waits below. A real seek fires its
// 'seeked' event and a real presentation fires requestVideoFrameCallback within
// tens of milliseconds; these bounds only engage when the event never comes --
// a seek that lands within the frame already on screen fires neither (WebKit for
// every such seek, and the other engines occasionally under load). They are
// sized so that even if EVERY frame in a clip fell through, the total stays well
// under the driver's 60s per-case timeout, turning what used to be a whole-page
// hang into, at worst, a bounded read that the ground-truth pixel check judges.
const SEEK_SETTLE_CAP_MS = 1500;
const PRESENTED_CAP_MS = 350;

// Resolve when the element reports its seek finished, but never hang: a no-op
// seek (already at the target media time) fires no 'seeked' at all, so fall
// through after the cap. Reading a frame early can only mismatch the expected
// bar and fail loudly -- it can never pass wrongly -- so the cap is safe.
function seekSettled(video, capMs) {
  return new Promise((resolve) => {
    let done = false;
    const finish = () => {
      if (done) return;
      done = true;
      video.removeEventListener('seeked', finish);
      resolve();
    };
    video.addEventListener('seeked', finish);
    setTimeout(finish, capMs);
  });
}

// Resolve on the next presented frame, but never hang for the same reason. A
// browser without requestVideoFrameCallback just gets a fixed settle.
function nextPresentedFrame(video, capMs) {
  if (!('requestVideoFrameCallback' in video)) {
    return new Promise((resolve) => setTimeout(resolve, 50));
  }
  return new Promise((resolve) => {
    let done = false;
    const finish = () => { if (!done) { done = true; resolve(); } };
    video.requestVideoFrameCallback(finish);
    setTimeout(finish, capMs);
  });
}

async function run() {
  const params = new URLSearchParams(location.search);
  const file = 'clips/' + params.get('file');
  const mode = params.get('mode');
  const video = document.getElementById('native-video');
  const canvas = document.getElementById('engine-canvas');

  // A Blob, so both engines read the same bytes and neither depends on the test
  // server honouring Range requests.
  const source = await (await fetch(file)).blob();

  // A perfectly indexable container is still unwalkable if the browser cannot
  // decode the codec at all (Ogg/Theora outside Firefox). Report that as its own
  // outcome rather than a harness error, and let the driver decide per browser
  // whether it was expected.
  const mimeByExtension = { ogv: 'video/ogg; codecs="theora"' };
  const extension = file.split('.').pop();
  if (mimeByExtension[extension]
      && video.canPlayType(mimeByExtension[extension]) === '') {
    window.__result = { unplayable: true, mime: mimeByExtension[extension] };
    return;
  }

  const engine = await createBestEngine(source, {
    canvas, video,
    prefer: (mode === 'native-index') ? 'native' : 'webcodecs',
  });

  const usingCanvas = engine.displayElement === canvas;

  // Prime the <video> path away from frame 0 before the loop below.
  //
  // WebKit fires no requestVideoFrameCallback for a seek that lands within the
  // frame already on screen -- and with a container index the engine's load()
  // presents frame 0 while calibrating the timeline, so the loop's very first
  // seek (to frame 0) would be exactly that no-op seek and nextPresentedFrame()
  // would wait forever. Chromium fires the callback for that seek anyway, which
  // is why this only bit WebKit. Seeking to the last frame first makes every
  // seek in the loop a genuine frame change, so a real presentation follows each
  // one on all three browsers. The canvas (WebCodecs) path decodes on its own
  // clock and needs none of this.
  if (!usingCanvas && engine.numFrames > 1) {
    engine.seekToFrame(engine.numFrames - 1);
    await seekSettled(video, SEEK_SETTLE_CAP_MS);
    await nextPresentedFrame(video, PRESENTED_CAP_MS);
  }

  const rows = [];
  for (let n = 0; n < engine.numFrames; n++) {
    engine.seekToFrame(n);

    if (usingCanvas) {
      await engine.ensureFrame(n);
      engine.update(performance.now());   // paints the frame at the playhead
      probeContext.drawImage(canvas, 0, 0, probe.width, probe.height);
    } else {
      // Let the element settle on the seek, then wait for it to actually present
      // a frame before believing what drawImage gives back. Both waits are
      // bounded: a seek that lands within the frame already on screen fires
      // neither event, and the pixel check below is the real judge.
      await seekSettled(video, SEEK_SETTLE_CAP_MS);
      await nextPresentedFrame(video, PRESENTED_CAP_MS);
      probeContext.drawImage(video, 0, 0, probe.width, probe.height);
    }

    rows.push({
      asked: n,
      // What the pixels show (ground truth) ...
      visible: visibleFrame(probe),
      // ... and what the engine claims is on screen.
      reported: engine.currentFrame,
    });
  }

  window.__result = {
    tier: engine.tier,
    frameIndexIsExact: engine.frameIndexIsExact,
    numFrames: engine.numFrames,
    rows,
  };
}
run().catch((e) => { window.__err = String(e && e.stack || e); });
</script>
