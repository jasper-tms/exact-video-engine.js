<!doctype html>
<meta charset="utf-8">
<title>exact-video-engine rotation test</title>
<script src="https://unpkg.com/mp4box@0.5.2/dist/mp4box.all.min.js"></script>
<script src="/exact-video-engine.js"></script>
<div id="pane"><canvas id="engine-canvas"></canvas></div>
<video id="native-video" muted playsinline></video>
<script>
// Loads ?file=<clip> through both the engine and a native <video> element
// (which applies rotation metadata itself, so it is the ground truth), then
// samples the four quadrants of each rendering so the driver script can
// compare where the clip's asymmetric red marker landed.
async function run() {
  const file = 'clips/' + new URLSearchParams(location.search).get('file');

  // Native <video> first: its videoWidth/videoHeight are the ground-truth
  // display dimensions. Size the engine's pane to the same aspect so no
  // letterboxing skews the comparison.
  const video = document.getElementById('native-video');
  video.src = file;
  await new Promise((resolve) => { video.onloadeddata = resolve; video.load(); });
  video.currentTime = 0.05;
  await new Promise((resolve) => { video.onseeked = resolve; });
  const pane = document.getElementById('pane');
  pane.style.width = video.videoWidth / 2 + 'px';
  pane.style.height = video.videoHeight / 2 + 'px';

  const blob = await (await fetch(file)).blob();
  const engine = new VideoEngine(document.getElementById('engine-canvas'));
  engine.addEventListener('errormessage', (event) => { window.__err = event.detail.message; });
  await engine.load(blob);
  window.__engine = {
    rotation: engine.rotation, videoWidth: engine.videoWidth,
    videoHeight: engine.videoHeight, numFrames: engine.numFrames,
  };

  const engineCanvas = document.getElementById('engine-canvas');
  const probe = document.createElement('canvas');
  probe.width = engineCanvas.width;
  probe.height = engineCanvas.height;
  probe.getContext('2d').drawImage(video, 0, 0, probe.width, probe.height);

  function quadrants(canvas) {
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height, out = {};
    for (const [name, x, y] of [['topLeft', w * 0.25, h * 0.25], ['topRight', w * 0.75, h * 0.25],
                                ['bottomLeft', w * 0.25, h * 0.75], ['bottomRight', w * 0.75, h * 0.75]]) {
      const d = ctx.getImageData(Math.round(x), Math.round(y), 1, 1).data;
      out[name] = d[0] > 128 && d[2] < 128 ? 'red' : (d[2] > 128 ? 'blue' : 'other');
    }
    return out;
  }
  window.__result = { engine: quadrants(engineCanvas), video: quadrants(probe) };
}
run().catch((e) => { window.__err = String(e); });
</script>
